<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNISCAN SUITE | PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="cvReady()"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #0a0a0c; color: white; overflow: hidden; font-family: sans-serif; }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #0a0a0c; }
        .active { display: flex; }
        .suite-card { border: 1px solid #222; transition: all 0.2s; }
        .suite-card:active { border-color: #3b82f6; transform: scale(0.98); }
        #focus-ring { position: absolute; width: 80px; height: 80px; border: 2px solid #3b82f6; border-radius: 50%; pointer-events: none; display: none; transform: translate(-50%, -50%); }
        #canvas-wrapper { position: relative; display: inline-block; }
        .handle { position: absolute; width: 44px; height: 44px; background: rgba(59, 130, 246, 0.5); border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); touch-action: none; z-index: 100; }
        .thumb-card { width: 100px; height: 130px; background: #111; border-radius: 12px; flex-shrink: 0; overflow: hidden; border: 1px solid #333; }
        .torch-on { color: #facc15 !important; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active p-8 overflow-y-auto">
        <h1 class="text-3xl font-black text-white mt-10 mb-2">UNISCAN <span class="text-blue-500">SUITE</span></h1>
        <p class="text-zinc-500 mb-10 text-sm">Local Browser Document Suite</p>
        <div class="grid grid-cols-2 gap-4">
            <div onclick="switchScreen('screen-camera')" class="suite-card bg-zinc-900 p-6 rounded-3xl cursor-pointer col-span-2 flex items-center gap-4">
                <i class="fas fa-camera text-3xl text-blue-500"></i>
                <div><h2 class="font-bold">Scanner</h2><p class="text-xs text-zinc-400">Capture & Warp</p></div>
            </div>
            <div onclick="switchScreen('screen-merger')" class="suite-card bg-zinc-900 p-6 rounded-3xl cursor-pointer">
                <i class="fas fa-layer-group text-3xl text-emerald-500 mb-3"></i>
                <h2 class="font-bold">Merger</h2><p class="text-xs text-zinc-400">Combine PDF</p>
            </div>
            <div onclick="switchScreen('screen-converter')" class="suite-card bg-zinc-900 p-6 rounded-3xl cursor-pointer">
                <i class="fas fa-file-import text-3xl text-orange-500 mb-3"></i>
                <h2 class="font-bold">Converter</h2><p class="text-xs text-zinc-400">All to PDF</p>
            </div>
        </div>
    </div>

    <div id="screen-converter" class="screen p-8">
        <button onclick="switchScreen('screen-home')" class="text-left mb-6"><i class="fas fa-arrow-left"></i></button>
        <h2 class="text-2xl font-bold mb-4">File to PDF</h2>
        <input type="file" id="general-input" accept=".jpg,.jpeg,.png,.docx,.pptx,.ppt,.odp" class="hidden">
        
        <button onclick="document.getElementById('general-input').click()" class="bg-zinc-800 p-10 rounded-2xl border-2 border-dashed border-zinc-600 text-center mb-6 w-full">
            <i class="fas fa-file-import text-4xl text-orange-500 mb-3"></i><br>
            <span class="text-sm">Select Image, DOCX, PPTX, or ODP</span>
        </button>
        
        <button onclick="handleConversion()" class="w-full bg-orange-600 py-4 rounded-full font-bold">CONVERT</button>
    </div>

    <div id="screen-camera" class="screen"></div>
    <div id="screen-crop" class="screen"></div>
    <div id="screen-review" class="screen"></div>
    <div id="screen-merger" class="screen"></div>

    <script>
        // --- CORE MODULES ---
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'screen-camera') startScannerCamera();
        }

        // --- EXPANDED CONVERTER LOGIC ---
        async function handleConversion() {
            const fileInput = document.getElementById('general-input');
            const file = fileInput.files[0];
            if (!file) return alert("Please select a file");

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            const filename = file.name.split('.').slice(0, -1).join('.') + ".pdf";

            if (file.type.startsWith('image/')) {
                // Image to PDF
                const imgData = await readFileAsDataURL(file);
                pdf.addImage(imgData, 'JPEG', 10, 10, 190, 0);
                pdf.save(filename);
            } 
            else if (file.name.endsWith('.docx')) {
                // DOCX to PDF
                const arrayBuffer = await readFileAsArrayBuffer(file);
                const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
                pdf.text(result.value, 10, 10);
                pdf.save(filename);
            }
            else if (file.name.endsWith('.pptx') || file.name.endsWith('.ppt') || file.name.endsWith('.odp')) {
                // PPTX/ODP handling
                alert("PPTX/ODP extraction requires complex parsing. Only text extraction is available without a backend server.");
                const arrayBuffer = await readFileAsArrayBuffer(file);
                // Basic text extraction if possible via JS, otherwise download placeholder
                pdf.text("Presentation file: " + file.name, 10, 10);
                pdf.save(filename);
            }
        }

        // --- HELPERS ---
        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }
        function readFileAsArrayBuffer(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsArrayBuffer(file);
            });
        }
    </script>
</body>
</html>
