<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNISCAN PRO | Batch Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="cvReady()"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: #000; }
        .active { display: flex; }
        
        /* Crop Area */
        #crop-ui-container { position: relative; flex: 1; background: #0a0a0a; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #canvas-wrapper { position: relative; display: inline-block; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        #image-canvas { max-width: 100%; max-height: 100%; display: block; }
        
        /* Handles */
        .handle { 
            position: absolute; width: 40px; height: 40px; 
            background: rgba(59, 130, 246, 0.5); border: 2px solid #fff; 
            border-radius: 50%; transform: translate(-50%, -50%); 
            touch-action: none; z-index: 100;
        }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Thumbnails */
        .thumb-card { width: 80px; height: 110px; background: #222; border-radius: 8px; flex-shrink: 0; position: relative; border: 2px solid #444; }
        .thumb-img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
        .delete-btn { position: absolute; -top: 8px; -right: 8px; background: #ef4444; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active justify-center items-center p-10">
        <div class="text-center mb-12">
            <i class="fas fa-layer-group text-6xl text-blue-500 mb-6"></i>
            <h1 class="text-5xl font-black italic tracking-tighter">UNISCAN</h1>
            <p class="text-zinc-500 font-bold uppercase text-[10px] tracking-widest mt-2">Batch Processing Engine</p>
        </div>
        
        <button onclick="openCamera()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition">
            NEW BATCH SCAN
        </button>
        
        <p id="engine-status" class="mt-8 text-[10px] font-bold text-zinc-700 uppercase tracking-widest italic">Core Warming Up...</p>
    </div>

    <div id="screen-camera" class="screen">
        <div class="flex-1 relative">
            <video id="v-feed" autoplay playsinline class="w-full h-full object-cover"></video>
        </div>
        <div class="h-40 bg-black flex items-center justify-around px-10">
            <button onclick="goHome()" class="text-zinc-500 text-xl"><i class="fas fa-times"></i></button>
            <div onclick="takeSnapshot()" class="w-20 h-20 border-4 border-white rounded-full p-1 cursor-pointer">
                <div class="w-full h-full bg-white rounded-full"></div>
            </div>
            <div class="relative">
                <i class="fas fa-images text-2xl text-zinc-500"></i>
                <div id="batch-count" class="absolute -top-2 -right-2 bg-blue-600 w-5 h-5 rounded-full text-[10px] flex items-center justify-center font-bold">0</div>
            </div>
        </div>
    </div>

    <div id="screen-crop" class="screen">
        <div class="h-16 flex justify-between items-center px-6 bg-zinc-900">
            <button onclick="openCamera()" class="text-zinc-400 font-bold text-xs uppercase">Discard</button>
            <span class="text-[10px] font-black tracking-widest uppercase">Manual Edge Selection</span>
            <button onclick="processWarp()" class="text-blue-500 font-bold text-xs uppercase">Keep Page</button>
        </div>

        <div id="crop-ui-container">
            <div id="canvas-wrapper">
                <canvas id="image-canvas"></canvas>
                <svg><path id="guide-path" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="3" /></svg>
                <div id="p0" class="handle" style="top:5%; left:5%;"></div>
                <div id="p1" class="handle" style="top:5%; left:95%;"></div>
                <div id="p2" class="handle" style="top:95%; left:95%;"></div>
                <div id="p3" class="handle" style="top:95%; left:5%;"></div>
            </div>
        </div>
    </div>

    <div id="screen-review" class="screen">
        <div class="p-8 flex-1 overflow-y-auto">
            <h2 class="text-2xl font-black mb-6">Review Batch</h2>
            <div id="review-grid" class="grid grid-cols-3 gap-4">
                </div>
        </div>
        <div class="p-8 bg-zinc-900 border-t border-white/5 flex gap-4">
            <button onclick="openCamera()" class="flex-1 bg-zinc-800 py-4 rounded-xl font-bold text-sm">ADD MORE</button>
            <button onclick="generateFinalPDF()" class="flex-1 bg-blue-600 py-4 rounded-xl font-bold text-sm shadow-lg">GENERATE PDF</button>
        </div>
    </div>

    <script>
        let rawImg = null;
        let points = [ {x:0, y:0}, {x:0, y:0}, {x:0, y:0}, {x:0, y:0} ];
        let batchPages = [];

        function cvReady() { document.getElementById('engine-status').innerText = "AI CORE ONLINE"; }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function openCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('v-feed').srcObject = stream;
            document.getElementById('batch-count').innerText = batchPages.length;
            switchScreen('screen-camera');
        }

        function takeSnapshot() {
            const video = document.getElementById('v-feed');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            rawImg = new Image();
            rawImg.src = canvas.toDataURL('image/jpeg');
            rawImg.onload = () => {
                initCropView();
                switchScreen('screen-crop');
            };
        }

        function initCropView() {
            const canvas = document.getElementById('image-canvas');
            const ctx = canvas.getContext('2d');
            const wrap = document.getElementById('canvas-wrapper');
            const scale = Math.min((window.innerWidth*0.9)/rawImg.width, (window.innerHeight*0.7)/rawImg.height);
            canvas.width = rawImg.width * scale; canvas.height = rawImg.height * scale;
            ctx.drawImage(rawImg, 0, 0, canvas.width, canvas.height);
            wrap.style.width = canvas.width+'px'; wrap.style.height = canvas.height+'px';
            resetHandles(canvas.width, canvas.height);
        }

        function resetHandles(w, h) {
            updateHandle(0, 40, 40); updateHandle(1, w-40, 40);
            updateHandle(2, w-40, h-40); updateHandle(3, 40, h-40);
            drawLines();
        }

        function updateHandle(i, x, y) {
            const h = document.getElementById('p'+i);
            h.style.left = x+'px'; h.style.top = y+'px';
            points[i] = {x, y};
        }

        let activeHandle = null;
        document.addEventListener('pointerdown', e => { if(e.target.classList.contains('handle')) activeHandle = e.target; });
        document.addEventListener('pointermove', e => {
            if(!activeHandle) return;
            const rect = document.getElementById('canvas-wrapper').getBoundingClientRect();
            let x = e.clientX - rect.left, y = e.clientY - rect.top;
            activeHandle.style.left = x+'px'; activeHandle.style.top = y+'px';
            points[activeHandle.id.replace('p','')] = {x, y};
            drawLines();
        });
        document.addEventListener('pointerup', () => activeHandle = null);

        function drawLines() {
            const d = `M ${points[0].x} ${points[0].y} L ${points[1].x} ${points[1].y} L ${points[2].x} ${points[2].y} L ${points[3].x} ${points[3].y} Z`;
            document.getElementById('guide-path').setAttribute('d', d);
        }

        // OpenCV PERSPECTIVE WARP
        function processWarp() {
            const canvas = document.getElementById('image-canvas');
            let src = cv.imread(canvas);
            let dst = new cv.Mat();
            let srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [points[0].x, points[0].y, points[1].x, points[1].y, points[2].x, points[2].y, points[3].x, points[3].y]);
            let dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, canvas.width, 0, canvas.width, canvas.height, 0, canvas.height]);
            let M = cv.getPerspectiveTransform(srcPts, dstPts);
            cv.warpPerspective(src, dst, M, new cv.Size(canvas.width, canvas.height));
            
            const outCanvas = document.createElement('canvas');
            cv.imshow(outCanvas, dst);
            batchPages.push(outCanvas.toDataURL());
            
            src.delete(); dst.delete(); M.delete(); srcPts.delete(); dstPts.delete();
            renderReview();
            switchScreen('screen-review');
        }

        function renderReview() {
            const grid = document.getElementById('review-grid');
            grid.innerHTML = '';
            batchPages.forEach((src, i) => {
                const div = document.createElement('div');
                div.className = 'thumb-card';
                div.innerHTML = `<img src="${src}" class="thumb-img"><div onclick="removePage(${i})" class="delete-btn"><i class="fas fa-times"></i></div>`;
                grid.appendChild(div);
            });
        }

        function removePage(i) { batchPages.splice(i, 1); renderReview(); }

        function generateFinalPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            batchPages.forEach((img, i) => {
                if(i > 0) pdf.addPage();
                pdf.addImage(img, 'PNG', 0, 0, 210, 297);
            });
            pdf.save("Batch_Scan.pdf");
            batchPages = []; goHome();
        }

        function goHome() { 
            const s = document.getElementById('v-feed').srcObject;
            if(s) s.getTracks().forEach(t => t.stop());
            switchScreen('screen-home'); 
        }
    </script>
</body>
</html>
