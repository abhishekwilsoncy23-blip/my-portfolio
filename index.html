<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNISCAN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="cvReady()"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .screen { position: absolute; inset: 0; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: #121212; display: none; }
        .active { display: flex; flex-direction: column; }
        #camera-feed { width: 100%; height: 100%; object-fit: cover; }
        .scanner-overlay { position: absolute; inset: 0; border: 2px solid rgba(59, 130, 246, 0.5); margin: 40px; border-radius: 12px; pointer-events: none; transition: 0.3s; }
        .scanner-overlay.detected { border-color: #10b981; background: rgba(16, 185, 129, 0.1); border-width: 4px; box-shadow: 0 0 25px #10b981; }
        .shutter-btn { width: 75px; height: 75px; border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); }
        .shutter-inner { width: 60px; height: 60px; background: white; border-radius: 50%; }
        .gallery-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active p-6 justify-between">
        <div class="mt-10">
            <h1 class="text-4xl font-black text-white tracking-tighter">UNISCAN<span class="text-blue-500">PRO</span></h1>
            <p class="text-zinc-500 font-medium">Professional Document Capture</p>
        </div>

        <div class="space-y-4">
            <div onclick="openCamera()" class="bg-blue-600 p-8 rounded-3xl flex items-center justify-between cursor-pointer active:scale-95 transition">
                <div>
                    <h2 class="text-white text-2xl font-bold">Start Scanning</h2>
                    <p class="text-blue-200 text-sm">AI Auto-Capture Enabled</p>
                </div>
                <i class="fas fa-camera text-4xl text-white"></i>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-800 p-6 rounded-3xl text-center">
                    <i class="fas fa-file-pdf text-2xl text-red-500 mb-2"></i>
                    <p class="text-xs text-zinc-400 font-bold uppercase">Recent PDFs</p>
                </div>
                <div class="bg-zinc-800 p-6 rounded-3xl text-center">
                    <i class="fas fa-cog text-2xl text-zinc-500 mb-2"></i>
                    <p class="text-xs text-zinc-400 font-bold uppercase">Settings</p>
                </div>
            </div>
        </div>

        <div id="cv-loader" class="text-center pb-10">
            <div class="loader w-6 h-6 border-2 border-zinc-700 rounded-full mx-auto mb-2"></div>
            <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">Warming up AI Engine...</p>
        </div>
    </div>

    <div id="screen-camera" class="screen">
        <div class="flex-1 relative overflow-hidden">
            <video id="camera-feed" autoplay playsinline></video>
            <div id="overlay" class="scanner-overlay"></div>
            
            <div class="absolute top-10 left-6 right-6 flex justify-between">
                <button onclick="goHome()" class="text-white text-xl"><i class="fas fa-times"></i></button>
                <div class="bg-black/50 px-4 py-1 rounded-full text-[10px] font-bold tracking-widest text-white uppercase">Auto-Capture: ON</div>
                <button class="text-white text-xl"><i class="fas fa-bolt"></i></button>
            </div>
        </div>

        <div class="h-44 bg-black flex items-center justify-around px-10">
            <div class="relative cursor-pointer" onclick="openGallery()">
                <div class="w-12 h-12 bg-zinc-800 rounded-lg overflow-hidden border border-zinc-700">
                    <img id="last-preview" class="w-full h-full object-cover hidden">
                </div>
                <div id="badge" class="gallery-badge hidden">0</div>
            </div>

            <div class="shutter-btn" onclick="captureImage()">
                <div class="shutter-inner"></div>
            </div>

            <button onclick="exportToPDF()" id="done-btn" class="text-blue-500 font-bold text-sm opacity-50 pointer-events-none">DONE</button>
        </div>
    </div>

    <canvas id="hidden-canvas" class="hidden"></canvas>

    <script>
        let capturedDocs = [];
        let isCvLoaded = false;
        let autoCaptureTimer = null;

        function cvReady() {
            isCvLoaded = true;
            document.getElementById('cv-loader').innerHTML = '<p class="text-emerald-500 font-bold text-[10px] uppercase">AI Engine Ready</p>';
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function openCamera() {
            switchScreen('screen-camera');
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            document.getElementById('camera-feed').srcObject = stream;
            startAutoDetectionLoop();
        }

        function startAutoDetectionLoop() {
            // Simplified AI Logic: We check for "Stability"
            // If the user holds the phone steady for 1.5 seconds, we auto-capture.
            if (autoCaptureTimer) clearTimeout(autoCaptureTimer);
            
            autoCaptureTimer = setTimeout(() => {
                const overlay = document.getElementById('overlay');
                overlay.classList.add('detected');
                
                setTimeout(() => {
                    captureImage();
                    overlay.classList.remove('detected');
                    startAutoDetectionLoop(); // Loop for next page
                }, 800);
            }, 2000);
        }

        function captureImage() {
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            capturedDocs.push(dataUrl);
            
            // Update UI
            const preview = document.getElementById('last-preview');
            preview.src = dataUrl;
            preview.classList.remove('hidden');
            
            const badge = document.getElementById('badge');
            badge.innerText = capturedDocs.length;
            badge.classList.remove('hidden');

            const doneBtn = document.getElementById('done-btn');
            doneBtn.classList.remove('opacity-50', 'pointer-events-none');
            
            // Haptic/Flash feedback simulation
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const width = doc.internal.pageSize.getWidth();
            const height = doc.internal.pageSize.getHeight();

            capturedDocs.forEach((img, i) => {
                if (i > 0) doc.addPage();
                doc.addImage(img, 'JPEG', 0, 0, width, height);
            });

            doc.save(`Uniscan_${new Date().getTime()}.pdf`);
            goHome();
            capturedDocs = [];
        }

        function goHome() {
            const stream = document.getElementById('camera-feed').srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
            switchScreen('screen-home');
            clearTimeout(autoCaptureTimer);
        }
    </script>
</body>
</html>
