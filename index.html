<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanted Poster Prank Maker</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #f4ece1; border: 12px solid #3c2a1a; padding: 30px; max-width: 450px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; color: #3c2a1a; position: relative; }
        h1 { font-size: 60px; margin: 0; line-height: 1; border-bottom: 5px solid #3c2a1a; padding-bottom: 10px; }
        h2 { font-size: 24px; margin: 10px 0; letter-spacing: 2px; }
        .photo-frame { width: 250px; height: 250px; border: 6px solid #3c2a1a; margin: 20px auto; background-color: #ddd; background-size: cover; background-position: center; filter: sepia(0.8) contrast(1.2); }
        .name-box { font-size: 35px; font-weight: bold; text-transform: uppercase; margin: 10px 0; }
        .reward-box { font-size: 30px; font-weight: bold; color: #7a1d1d; border: 4px dashed #7a1d1d; padding: 10px; display: inline-block; width: 90%; }
        
        .qr-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; display: none; }
        #qrcode { padding: 10px; background: white; border: 2px solid #3c2a1a; }
        .scan-text { font-weight: bold; margin-top: 5px; font-size: 14px; }

        .form-overlay { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: left; margin-top: 20px; width: 100%; max-width: 450px; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #333; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #3c2a1a; color: white; border: none; padding: 15px; width: 100%; margin-top: 20px; font-size: 18px; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .print-btn { background: #7a1d1d; margin-top: 10px; display: none; width: 100%; max-width: 450px; }
        
        @media print { .form-overlay, button, .print-btn { display: none !important; } .container { border: 8px solid black; box-shadow: none; } }
    </style>
</head>
<body>

<div class="container" id="posterContent">
    <h1>WANTED</h1>
    <h2>DEAD OR ALIVE</h2>
    <div class="photo-frame" id="displayPhoto"></div>
    <div class="name-box" id="displayName">TARGET NAME</div>
    <div class="reward-box" id="displayReward">REWARD: $1,000,000</div>
    
    <div class="qr-section" id="qrContainer">
        <div id="qrcode"></div>
        <div class="scan-text">SCAN TO SEE CRIME FILE</div>
    </div>
</div>

<div class="form-overlay" id="inputForm">
    <label>Photo URL (Right-click image -> Copy Image Address):</label>
    <input type="text" id="inPhoto" placeholder="Paste link here">
    <label>Target's Name:</label>
    <input type="text" id="inName" placeholder="Who is wanted?">
    <label>Reward Amount:</label>
    <input type="text" id="inReward" placeholder="e.g. 500 Gold Coins">
    <label>QR Link (The "Crime File"):</label>
    <input type="text" id="inLink" value="https://google.com" placeholder="Link when scanned">
    <button onclick="updatePoster()">Generate Prank Poster</button>
</div>

<button class="print-btn" id="printBtn" onclick="window.print()">Download / Save PDF</button>

<script>
    function updatePoster() {
        const name = document.getElementById('inName').value || "THE FUGITIVE";
        const reward = document.getElementById('inReward').value || "$0.00";
        const photo = document.getElementById('inPhoto').value;
        const link = document.getElementById('inLink').value;

        document.getElementById('displayName').innerText = name;
        document.getElementById('displayReward').innerText = "REWARD: " + reward;
        
        if(photo) {
            document.getElementById('displayPhoto').style.backgroundImage = "url('" + photo + "')";
        }

        // Generate QR Code
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: link,
            width: 100,
            height: 100
        });

        document.getElementById('qrContainer').style.display = 'flex';
        document.getElementById('inputForm').style.display = 'none';
        document.getElementById('printBtn').style.display = 'block';
    }
</script>
</body>
</html>
