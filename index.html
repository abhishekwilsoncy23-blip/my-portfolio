<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOC SUITE | Pro Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background: #0a0a0c; color: white; overflow-x: hidden; font-family: sans-serif; touch-action: manipulation; }
        .screen { display: none; flex-direction: column; min-height: 100vh; }
        .active { display: flex; }
        
        /* Responsive List Item */
        .list-item { 
            background: #1a1a20; border: 1px solid #333; border-radius: 12px; 
            padding: 12px 16px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
            transition: transform 0.1s;
        }
        .file-info { flex: 1; min-width: 0; /* allows text truncation */ }
        .controls { display: flex; gap: 6px; flex-shrink: 0; }
        
        .btn-icon { 
            width: 36px; height: 36px; border-radius: 8px; background: #2a2a32; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: background 0.2s;
        }
        .btn-icon:active { background: #444; transform: scale(0.95); }
        .btn-icon:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active p-6 md:p-10 max-w-3xl mx-auto w-full">
        <h1 class="text-4xl font-black text-white mt-10 mb-2 tracking-tight">DOC <span class="text-blue-500">SUITE</span></h1>
        <p class="text-zinc-500 text-sm mb-12">100% Offline Browser Utilities</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div onclick="switchScreen('screen-merger')" class="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl cursor-pointer active:bg-zinc-800 transition hover:border-emerald-500/50">
                <div class="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center mb-6">
                    <i class="fas fa-layer-group text-2xl text-emerald-500"></i>
                </div>
                <h2 class="font-bold text-xl mb-1">PDF Merger</h2>
                <p class="text-sm text-zinc-400">Order & Combine PDFs</p>
            </div>
            
            <div onclick="switchScreen('screen-converter')" class="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl cursor-pointer active:bg-zinc-800 transition hover:border-orange-500/50">
                <div class="w-14 h-14 bg-orange-500/10 rounded-2xl flex items-center justify-center mb-6">
                    <i class="fas fa-file-export text-2xl text-orange-500"></i>
                </div>
                <h2 class="font-bold text-xl mb-1">File Converter</h2>
                <p class="text-sm text-zinc-400">Images & DOCX to PDF</p>
            </div>
        </div>
    </div>

    <div id="screen-merger" class="screen p-6 md:p-10 max-w-3xl mx-auto w-full flex-1">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="switchScreen('screen-home')" class="text-zinc-400 hover:text-white text-xl p-2 -ml-2"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-2xl font-bold">PDF Merger</h2>
        </div>
        
        <input type="file" id="merge-input" multiple accept=".pdf" class="hidden" onchange="addFiles(event, 'merge')">
        <button onclick="document.getElementById('merge-input').click()" class="bg-zinc-900 border-2 border-dashed border-zinc-700 p-10 rounded-3xl text-center mb-6 w-full active:bg-zinc-800 transition">
            <i class="fas fa-plus text-3xl text-emerald-500 mb-3"></i><br><span class="text-zinc-300 font-bold">Add PDF Files</span>
        </button>

        <div id="merge-list" class="flex-1 overflow-y-auto mb-6"></div>

        <button onclick="executeMerge()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-bold text-white tracking-widest transition mt-auto shadow-lg shadow-emerald-900/20">MERGE DOCUMENT</button>
    </div>

    <div id="screen-converter" class="screen p-6 md:p-10 max-w-3xl mx-auto w-full flex-1">
        <div class="flex items-center gap-4 mb-8">
            <button onclick="switchScreen('screen-home')" class="text-zinc-400 hover:text-white text-xl p-2 -ml-2"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-2xl font-bold">File Converter</h2>
        </div>

        <input type="file" id="convert-input" multiple accept=".jpg,.jpeg,.png,.docx" class="hidden" onchange="addFiles(event, 'convert')">
        <button onclick="document.getElementById('convert-input').click()" class="bg-zinc-900 border-2 border-dashed border-zinc-700 p-10 rounded-3xl text-center mb-6 w-full active:bg-zinc-800 transition">
            <i class="fas fa-images text-3xl text-orange-500 mb-3"></i><br><span class="text-zinc-300 font-bold">Add Images or DOCX</span>
        </button>

        <div id="convert-list" class="flex-1 overflow-y-auto mb-6"></div>

        <button onclick="executeConvert()" class="w-full bg-orange-600 hover:bg-orange-500 py-5 rounded-2xl font-bold text-white tracking-widest transition mt-auto shadow-lg shadow-orange-900/20">CONVERT TO PDF</button>
    </div>

    <script>
        // --- STATE & NAVIGATION ---
        let state = { merge: [], convert: [] };

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function downloadBlob(bytes, filename) {
            const blob = new Blob([bytes], {type: "application/pdf"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        // --- UNIFIED LIST LOGIC ---
        function addFiles(event, type) {
            const files = Array.from(event.target.files);
            state[type] = state[type].concat(files);
            renderList(type);
            event.target.value = ''; 
        }

        function moveItem(index, direction, type) {
            if (index + direction < 0 || index + direction >= state[type].length) return;
            const temp = state[type][index];
            state[type][index] = state[type][index + direction];
            state[type][index + direction] = temp;
            renderList(type);
        }

        function removeItem(index, type) {
            state[type].splice(index, 1);
            renderList(type);
        }

        function renderList(type) {
            const listEl = document.getElementById(`${type}-list`);
            listEl.innerHTML = '';
            
            if (state[type].length === 0) {
                listEl.innerHTML = `<div class="text-zinc-600 text-center py-8 text-sm bg-zinc-900/50 rounded-2xl border border-zinc-800">No files added yet.</div>`;
                return;
            }

            state[type].forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'list-item';
                
                // Icon based on file type
                let icon = 'fa-file';
                let color = 'text-zinc-400';
                if(file.name.toLowerCase().endsWith('.pdf')) { icon = 'fa-file-pdf'; color = 'text-emerald-500'; }
                else if(file.name.toLowerCase().match(/\.(jpg|jpeg|png)$/)) { icon = 'fa-image'; color = 'text-blue-400'; }
                else if(file.name.toLowerCase().endsWith('.docx')) { icon = 'fa-file-word'; color = 'text-blue-600'; }

                item.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <i class="fas ${icon} ${color} text-xl w-6 text-center"></i>
                        <div class="file-info">
                            <div class="text-sm font-bold text-white truncate">${file.name}</div>
                            <div class="text-xs text-zinc-500 mt-0.5">${(file.size / 1024 / 1024).toFixed(2)} MB</div>
                        </div>
                    </div>
                    <div class="controls">
                        <button class="btn-icon" onclick="moveItem(${index}, -1, '${type}')" ${index === 0 ? 'disabled' : ''}><i class="fas fa-chevron-up text-zinc-400"></i></button>
                        <button class="btn-icon" onclick="moveItem(${index}, 1, '${type}')" ${index === state[type].length - 1 ? 'disabled' : ''}><i class="fas fa-chevron-down text-zinc-400"></i></button>
                        <button class="btn-icon !bg-red-500/10 hover:!bg-red-500/20" onclick="removeItem(${index}, '${type}')"><i class="fas fa-times text-red-500"></i></button>
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        // --- EXECUTION: MERGE ---
        async function executeMerge() {
            if (state.merge.length < 2) return alert("Please add at least 2 PDFs to merge.");
            
            // UI Feedback
            const btn = document.querySelector('#screen-merger button:last-child');
            const originalText = btn.innerText;
            btn.innerText = "MERGING..."; btn.style.opacity = 0.7;

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                for (let file of state.merge) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach(page => mergedPdf.addPage(page));
                }
                const mergedPdfBytes = await mergedPdf.save();
                downloadBlob(mergedPdfBytes, "Merged_Document.pdf");
                
                state.merge = []; renderList('merge'); switchScreen('screen-home');
            } catch (error) {
                alert("Error merging files. Ensure they are valid PDFs.");
            } finally {
                btn.innerText = originalText; btn.style.opacity = 1;
            }
        }

        // --- EXECUTION: CONVERT (MULTI-FILE) ---
        async function executeConvert() {
            if (state.convert.length === 0) return alert("Please add files to convert.");

            const btn = document.querySelector('#screen-converter button:last-child');
            const originalText = btn.innerText;
            btn.innerText = "CONVERTING..."; btn.style.opacity = 0.7;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ format: 'a4', unit: 'mm' });
            let isFirstPage = true;

            try {
                for (let file of state.convert) {
                    if (file.type.startsWith('image/')) {
                        // Image Handling
                        if (!isFirstPage) pdf.addPage();
                        
                        const imgData = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = e => resolve(e.target.result);
                            reader.readAsDataURL(file);
                        });

                        const imgProps = pdf.getImageProperties(imgData);
                        const pdfWidth = pdf.internal.pageSize.getWidth();
                        const pdfHeight = pdf.internal.pageSize.getHeight();
                        
                        // Calculate aspect ratio to fit within A4
                        const ratio = Math.min(pdfWidth / imgProps.width, pdfHeight / imgProps.height);
                        const width = imgProps.width * ratio;
                        const height = imgProps.height * ratio;
                        
                        // Center image on page
                        const x = (pdfWidth - width) / 2;
                        const y = (pdfHeight - height) / 2;

                        pdf.addImage(imgData, 'JPEG', x, y, width, height, undefined, 'FAST');
                        isFirstPage = false;
                    } 
                    else if (file.name.toLowerCase().endsWith('.docx')) {
                        // DOCX Text Extraction Handling
                        if (!isFirstPage) pdf.addPage();

                        const arrayBuffer = await file.arrayBuffer();
                        const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
                        
                        // Split text to fit A4 width (approx 190mm usable width)
                        const splitText = pdf.splitTextToSize(result.value, 190);
                        let yPos = 15;
                        
                        for (let i = 0; i < splitText.length; i++) {
                            if (yPos > 280) { // A4 height is ~297mm
                                pdf.addPage();
                                yPos = 15;
                            }
                            pdf.text(splitText[i], 10, yPos);
                            yPos += 7; // Line spacing
                        }
                        isFirstPage = false;
                    }
                }
                
                // Set dynamic filename based on the first file or generic if multiple
                let outName = state.convert.length === 1 
                    ? state.convert[0].name.split('.')[0] + ".pdf" 
                    : "Converted_Document_Batch.pdf";
                
                pdf.save(outName);
                state.convert = []; renderList('convert'); switchScreen('screen-home');

            } catch (err) {
                alert("Error during conversion.");
                console.error(err);
            } finally {
                btn.innerText = originalText; btn.style.opacity = 1;
            }
        }

        // Initialize empty lists on load
        renderList('merge');
        renderList('convert');
    </script>
</body>
</html>
